# MarketPulse service orchestration.
# See ARCHITECTURE.md ADR-003 (single Postgres instance for state, dataset, audit).

services:
  postgres:
    # Debian-based standard image (NOT alpine): alpine's musl/glibc and locale
    # differences cause subtle issues with bulk loads and string sorting.
    image: postgres:18
    container_name: marketpulse-postgres
    restart: unless-stopped
    ports:
      # Host port is configurable and defaults to 5433 (NOT 5432) to avoid
      # colliding with a native PostgreSQL that may already own 5432 on the
      # host. Override POSTGRES_PORT in .env if 5433 is also taken. The
      # container's internal port is always 5432.
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: marketpulse
      # DB user inside the container — project-named for portability, unrelated
      # to the host OS user. Anyone cloning gets the same setup without edits.
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      # Predictable Unicode handling for Yelp data (encoding + collation).
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    volumes:
      # Named volume for durable persistence (not a bind mount).
      # PG18 places data in a version-specific subdir (/var/lib/postgresql/18/docker/)
      # when mounted at /var/lib/postgresql — enables future pg_upgrade --link.
      # See https://github.com/docker-library/postgres/pull/1259
      - postgres_data:/var/lib/postgresql
      # Numbered SQL migrations run alphabetically on first boot only.
      - ./db/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpulse -d marketpulse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- Community MCP servers (AGPL-3.0) ----
  # These are third-party MCP servers (see CLAUDE.md build-vs-buy decisions).
  # They communicate over stdio transport, NOT HTTP, and are launched as
  # subprocesses by the LangGraph agent on demand: the agent starts one,
  # calls its tools, and lets it exit. They do NOT run continuously.
  #
  # Defining them here does not add them to the always-on service stack
  # (note restart: "no"). It just ensures the images are pulled and their
  # configuration is captured consistently in one place. `docker compose up`
  # will start them, but the agent owns their real lifecycle at runtime.
  sec-edgar-mcp:
    # PINNED to 1.0.8 — do not use :latest.
    image: stefanoamorelli/sec-edgar-mcp:1.0.8
    container_name: marketpulse-sec-edgar-mcp
    # Excluded from default `up` — stdio MCP servers are launched as
    # ephemeral subprocesses by the agent, not run as services. Defined
    # here only to pin image versions and document configuration. Use
    # `docker run` or `docker compose --profile mcp-manual up <service>`
    # for manual testing.
    profiles: ["mcp-manual"]
    environment:
      # Read from .env — not hardcoded. SEC requires a valid User-Agent.
      SEC_EDGAR_USER_AGENT: ${SEC_EDGAR_USER_AGENT}
    stdin_open: true   # required for MCP stdio transport
    tty: true
    restart: "no"      # launched on-demand by the agent, not long-running

  fred-mcp-server:
    # Docker tag :latest for now — will pin via digest once we verify what works.
    image: stefanoamorelli/fred-mcp-server:latest
    container_name: marketpulse-fred-mcp-server
    # Excluded from default `up` — stdio MCP servers are launched as
    # ephemeral subprocesses by the agent, not run as services. Defined
    # here only to pin image versions and document configuration. Use
    # `docker run` or `docker compose --profile mcp-manual up <service>`
    # for manual testing.
    profiles: ["mcp-manual"]
    environment:
      # Read from .env — not hardcoded.
      FRED_API_KEY: ${FRED_API_KEY}
    stdin_open: true   # required for MCP stdio transport
    tty: true
    restart: "no"      # launched on-demand by the agent, not long-running

volumes:
  postgres_data:
